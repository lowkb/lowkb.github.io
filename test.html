<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Strona z trzema sekcjami</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="overflow-hidden">
  <div id="scroll-container" class="h-screen" style="touch-action: none;">
    <div id="content" class="h-[300vh] transition-transform duration-700 ease-in-out">
      <section class="h-screen bg-blue-600 flex items-center justify-center text-white text-3xl">
        Main
      </section>
      <section class="h-screen bg-green-600 flex items-center justify-center text-white text-3xl">
        Info
      </section>
      <section class="h-screen bg-red-600 flex items-center justify-center text-white text-3xl">
        Stats
      </section>
    </div>
  </div>
  <script>
    (function(){
      let currentSection = 0;
      const maxSection = 2; // indeksy: 0, 1, 2
      let isAnimating = false;
      const content = document.getElementById('content');
      const container = document.getElementById('scroll-container');

      container.addEventListener('wheel', function(e) {
        if (isAnimating) return;
        if (e.deltaY > 0 && currentSection < maxSection) {
          isAnimating = true;
          currentSection++;
          content.style.transform = `translateY(-${currentSection * 100}vh)`;
          setTimeout(() => { isAnimating = false; }, 800);
        } else if (e.deltaY < 0 && currentSection > 0) {
          isAnimating = true;
          currentSection--;
          content.style.transform = `translateY(-${currentSection * 100}vh)`;
          setTimeout(() => { isAnimating = false; }, 800);
        }
      });
    })();
  </script>
</body>
</html>
