<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord-Style Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --discord-dark: #36393f;
            --discord-secondary: #2f3136;
            --discord-text: #dcddde;
            --discord-primary: #5865f2;
            --discord-green: #57f287;
            --discord-red: #ed4245;
        }

        body {
            background-color: var(--discord-dark);
            color: var(--discord-text);
            font-family: 'Whitney', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            margin: 0;
            line-height: 1.5;
        }

        .container {
            max-width: 780px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Banner i Avatar */
        .profile-banner {
            height: 200px;
            background: linear-gradient(45deg, #2f3136, #40444b);
            position: relative;
            border-radius: 8px 8px 0 0;
        }

        .profile-avatar {
            position: absolute;
            bottom: -50px;
            left: 30px;
            border: 6px solid var(--discord-dark);
            border-radius: 50%;
            width: 120px;
            height: 120px;
            overflow: hidden;
            background: #2f3136;
        }

        .profile-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .online-status {
            position: absolute;
            bottom: 5px;
            right: 5px;
            width: 20px;
            height: 20px;
            background: var(--discord-green);
            border-radius: 50%;
            border: 3px solid var(--discord-dark);
        }

        /* Sekcja Informacji */
        .profile-info {
            background: var(--discord-secondary);
            padding: 80px 30px 30px;
            border-radius: 0 0 8px 8px;
        }

        .username {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .discriminator {
            color: #72767d;
            font-size: 1.2rem;
        }

        /* Rangi/Technologie */
        .badges-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 20px 0;
        }

        .role-badge {
            background: #40444b;
            padding: 5px 12px;
            border-radius: 12px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .role-badge::before {
            content: '';
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .javascript { background: #f7df1e; color: #000; }
        .python { background: #3776ab; }
        .react { background: #61dafb; color: #000; }
        .node { background: #68a063; }

        /* Sekcja Projektów */
        .projects-section {
            margin-top: 30px;
            background: var(--discord-secondary);
            padding: 20px;
            border-radius: 8px;
        }

        .project-card {
            background: var(--discord-dark);
            padding: 15px;
            margin: 15px 0;
            border-radius: 5px;
            border-left: 4px solid var(--discord-primary);
        }

        .project-title {
            color: var(--discord-text);
            font-weight: 600;
            margin-bottom: 8px;
        }

        /* Przyciski */
        .discord-button {
            background: var(--discord-primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 3px;
            cursor: pointer;
            font-weight: 500;
            margin: 10px 0;
        }

        .discord-button:hover {
            background: #4752c4;
        }

        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }

            .profile-avatar {
                left: 50%;
                transform: translateX(-50%);
                bottom: -60px;
            }

            .profile-info {
                padding-top: 80px;
                text-align: center;
            }

            .badges-container {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="profile-banner">
            <div class="profile-avatar">
                <img src="avatar.jpg" alt="Profilowe">
                <div class="online-status"></div>
            </div>
        </div>

        <div class="profile-info">
            <h1 class="username">DevMaster<span class="discriminator">#1234</span></h1>
            
            <div class="badges-container">
                <div class="role-badge javascript">
                    <i class="fab fa-js"></i>
                    JavaScript
                </div>
                <div class="role-badge python">
                    <i class="fab fa-python"></i>
                    Python
                </div>
                <div class="role-badge react">
                    <i class="fab fa-react"></i>
                    React
                </div>
                <div class="role-badge node">
                    <i class="fab fa-node"></i>
                    Node.js
                </div>
            </div>

            <div class="bio-section">
                <h3>O MNIE</h3>
                <p>🔭 Aktualnie pracuję nad systemem AI<br>
                🌱 Uczę się cybersecurity<br>
                💬 Zapytaj mnie o frameworki JS</p>
            </div>

            <div class="projects-section">
                <h3>AKTYWNE PROJEKTY</h3>
                <div class="project-card">
                    <div class="project-title">Discord Bot</div>
                    <p>Zaawansowany bot zarządzający serwerem z AI</p>
                </div>
                <div class="project-card">
                    <div class="project-title">E-commerce Platform</div>
                    <p>Pełny system sprzedażowy z React i Node.js</p>
                </div>
            </div>

            <button class="discord-button">
                <i class="fab fa-discord"></i> Skontaktuj się ze mną
            </button>
        </div>
    </div>
</body>
</html>
