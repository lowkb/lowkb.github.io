<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stylizowane Bio</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background-color: #000;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      width: 350px;
      background-color: #1e1e1e;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.4);
    }

    .header {
      background: url('header-image.jpg') center/cover no-repeat;
      height: 180px;
      display: flex;
      justify-content: center;
      align-items: center;
      text-transform: uppercase;
      font-weight: bold;
      font-size: 1.5rem;
    }

    .header-text {
      background: rgba(0, 0, 0, 0.6);
      padding: 10px 20px;
      border-radius: 5px;
    }

    .content {
      padding: 20px;
    }

    .avatar {
      display: flex;
      justify-content: center;
      margin-top: -50px;
    }

    .avatar img {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 3px solid #1e1e1e;
      background-color: #000;
    }

    .bio-title {
      text-align: center;
      font-size: 1.2rem;
      margin-top: 10px;
    }

    .bio-desc {
      text-align: center;
      font-size: 0.9rem;
      margin: 10px 0;
      color: #ccc;
    }

    .stats {
      display: flex;
      justify-content: space-around;
      margin: 15px 0;
    }

    .stat {
      text-align: center;
    }

    .stat h3 {
      margin: 5px 0;
    }

    .links {
      text-align: center;
      margin: 20px 0;
    }

    .links a {
      text-decoration: none;
      color: #00aaff;
      font-weight: bold;
    }

    .subscribe-btn {
      display: block;
      width: 90%;
      margin: 10px auto;
      padding: 10px;
      background-color: #00aaff;
      color: #fff;
      border: none;
      border-radius: 5px;
      text-align: center;
      font-weight: bold;
      text-transform: uppercase;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    .subscribe-btn:hover {
      background-color: #0077cc;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <div class="header-text">Serial Killer</div>
    </div>
    <!-- Avatar -->
    <div class="avatar">
      <img src="avatar.png" alt="Avatar">
    </div>
    <!-- Bio -->
    <div class="content">
      <h2 class="bio-title">Mój Własny Styl</h2>
      <p class="bio-desc">
        "To jest przykładowe bio z własnym stylem inspirowanym twoim obrazem."
      </p>
      <!-- Stats -->
      <div class="stats">
        <div class="stat">
          <h3>326,2K</h3>
          <p>Subskrybentów</p>
        </div>
      </div>
      <!-- Links -->
      <div class="links">
        <a href="https://youtube.com/">youtube.com/mojkanal</a>
      </div>
      <!-- Subscribe Button -->
      <button class="subscribe-btn">Subskrybuj</button>
    </div>
  </div>
</body>
</html>
