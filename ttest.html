<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UI ze zdjęcia</title>
  <style>
    /* Resetowanie domyślnych styli */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background-color: #000;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    /* Kontener główny */
    .container {
      width: 400px;
      background-color: #1e1e1e;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 5px 10px rgba(0, 0, 0, 0.6);
    }

    /* Sekcja banera */
    .banner {
      position: relative;
      background: url('banner.jpg') center/cover no-repeat;
      height: 120px;
    }

    .banner h1 {
      position: absolute;
      bottom: 10px;
      left: 15px;
      font-size: 1.5rem;
      color: #fff;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.6);
    }

    /* Profil z awatarem */
    .profile {
      position: relative;
      text-align: center;
      margin-top: -50px;
    }

    .profile img {
      width: 100px;
      height: 100px;
      border: 4px solid #1e1e1e;
      border-radius: 50%;
      background-color: #000;
    }

    .profile h2 {
      margin-top: 10px;
      font-size: 1.3rem;
      font-weight: bold;
    }

    .profile p {
      font-size: 0.9rem;
      color: #aaa;
      padding: 10px;
    }

    /* Statystyki */
    .stats {
      display: flex;
      justify-content: center;
      margin: 10px 0;
    }

    .stats div {
      text-align: center;
    }

    .stats h3 {
      font-size: 1.2rem;
      color: #fff;
    }

    .stats p {
      color: #aaa;
      font-size: 0.8rem;
    }

    /* Linki */
    .links {
      text-align: center;
      margin: 15px 0;
    }

    .links a {
      color: #00aaff;
      text-decoration: none;
      font-size: 0.9rem;
    }

    .links a:hover {
      text-decoration: underline;
    }

    /* Przycisk Subskrypcji */
    .subscribe-btn {
      display: block;
      margin: 10px auto 20px;
      padding: 10px 0;
      width: 90%;
      background-color: #00aaff;
      color: #fff;
      border: none;
      border-radius: 5px;
      font-size: 1rem;
      font-weight: bold;
      text-transform: uppercase;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    .subscribe-btn:hover {
      background-color: #0077cc;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Banner -->
    <div class="banner">
      <h1>SERIAL KILLER</h1>
    </div>
    <!-- Profil -->
    <div class="profile">
      <img src="avatar.png" alt="Avatar">
      <h2>Мир Маньяков и Серийных Убийц</h2>
      <p>
        Мы — часть “true crime community” в России, литературного жанра, занимающегося публикацией документов, свежих новостей.
      </p>
    </div>
    <!-- Statystyki -->
    <div class="stats">
      <div>
        <h3>326,2K</h3>
        <p>Subskrybentów</p>
      </div>
    </div>
    <!-- Linki -->
    <div class="links">
      <a href="https://youtube.com/c/GONZOKVLT" target="_blank">youtube.com/c/GONZOKVLT</a>
    </div>
    <!-- Przycisk Subskrypcji -->
    <button class="subscribe-btn">Subskrybuj</button>
  </div>
</body>
</html>
