<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | [Twoje Imię]</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #8A2BE2;
            --secondary-color: #4B0082;
            --dark-color: #0A0A0A;
            --accent-color: #9400D3;
            --light-color: #F8F8FF;
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            background-color: var(--dark-color);
            color: var(--light-color);
            transition: var(--transition);
        }

        /* Avatar */
        .avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 4px solid var(--primary-color);
            margin: -75px auto 2rem;
            position: relative;
            box-shadow: 0 0 20px var(--accent-color);
            overflow: hidden;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Nawigacja */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(10, 10, 10, 0.95);
            padding: 1rem;
            box-shadow: 0 2px 10px var(--accent-color);
            z-index: 1000;
        }

        .nav-links {
            display: flex;
            justify-content: center;
            gap: 2rem;
            list-style: none;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--light-color);
            font-weight: 500;
            transition: var(--transition);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .nav-links a:hover {
            color: var(--primary-color);
            text-shadow: 0 0 10px var(--accent-color);
        }

        /* Sekcja Hero */
        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            position: relative;
            margin-top: 80px;
        }

        .hero::after {
            content: '';
            position: absolute;
            bottom: -50px;
            left: 50%;
            transform: translateX(-50%);
            width: 2px;
            height: 50px;
            background: var(--light-color);
        }

        .hero-content h1 {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            text-shadow: 0 0 20px rgba(138, 43, 226, 0.5);
        }

        .hero-content p {
            font-size: 1.5rem;
            margin-bottom: 2rem;
            color: var(--light-color);
        }

        /* Projekty */
        .projects {
            padding: 5rem 2rem;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .project-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(138, 43, 226, 0.2);
            transition: var(--transition);
            backdrop-filter: blur(10px);
            border: 1px solid var(--primary-color);
        }

        .project-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 10px 25px var(--accent-color);
        }

        .project-image {
            height: 200px;
            overflow: hidden;
            position: relative;
        }

        .project-image::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, var(--primary-color), transparent);
            opacity: 0.3;
        }

        .project-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .project-info {
            padding: 1.5rem;
        }

        /* Umiejętności */
        .skills {
            padding: 5rem 2rem;
            background: rgba(10, 10, 10, 0.9);
        }

        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .skill-item {
            text-align: center;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            transition: var(--transition);
            border: 1px solid var(--primary-color);
        }

        .skill-item:hover {
            background: rgba(138, 43, 226, 0.1);
            transform: scale(1.05);
        }

        .skill-item i {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            color: var(--primary-color);
            text-shadow: 0 0 15px var(--accent-color);
        }

        /* Animacje */
        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: 1s ease;
        }

        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* Responsywność */
        @media (max-width: 768px) {
            .hero-content h1 {
                font-size: 2.5rem;
            }

            .nav-links {
                gap: 1rem;
                font-size: 0.9rem;
            }

            .avatar {
                width: 120px;
                height: 120px;
                margin-top: -60px;
            }
        }
    </style>
</head>
<body>
    <!-- Avatar -->
    <div class="avatar reveal">
        <img src="twoje-zdjecie.jpg" alt="Twoje zdjęcie">
    </div>

    <!-- Nawigacja -->
    <nav class="navbar">
        <ul class="nav-links">
            <li><a href="#home">Strona główna</a></li>
            <li><a href="#projects">Projekty</a></li>
            <li><a href="#skills">Umiejętności</a></li>
        </ul>
    </nav>

    <!-- Sekcja Hero -->
    <section id="home" class="hero">
        <div class="hero-content reveal">
            <h1>Cześć, Jestem [Imię]</h1>
            <p>Full Stack Developer & Cyber Security Specialist</p>
            <button>Zobacz Portfolio</button>
        </div>
    </section>

    <!-- Projekty -->
    <section id="projects" class="projects">
        <div class="project-card reveal">
            <div class="project-image">
                <img src="project1.jpg" alt="Projekt 1">
            </div>
            <div class="project-info">
                <h3>Zaawansowany System Bezpieczeństwa</h3>
                <p>Python • Django • Cyber Security</p>
                <div class="project-links">
                    <a href="#"><i class="fab fa-github"></i> Repozytorium</a>
                </div>
            </div>
        </div>
        <!-- Dodaj więcej projektów -->
    </section>

    <!-- Umiejętności -->
    <section id="skills" class="skills">
        <div class="skills-grid">
            <div class="skill-item reveal">
                <i class="fab fa-python"></i>
                <h4>Python</h4>
                <p>Zaawansowany</p>
            </div>
            <div class="skill-item reveal">
                <i class="fas fa-shield-alt"></i>
                <h4>Cyber Security</h4>
                <p>Pentesting • OWASP</p>
            </div>
            <!-- Dodaj więcej umiejętności -->
        </div>
    </section>

    <script>
        // Animacje przy przewijaniu
        const revealElements = document.querySelectorAll('.reveal');
        
        const revealOnScroll = () => {
            revealElements.forEach(element => {
                const elementTop = element.getBoundingClientRect().top;
                const windowHeight = window.innerHeight;
                
                if (elementTop < windowHeight - 100) {
                    element.classList.add('active');
                }
            });
        };

        window.addEventListener('scroll', revealOnScroll);
        revealOnScroll();

        // Gładkie przewijanie
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                document.querySelector(this.getAttribute('href')).scrollIntoView({
                    behavior: 'smooth'
                });
            });
        });
    </script>
</body>
</html>
