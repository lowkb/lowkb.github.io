<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>low_kb - portfolio</title>
  <style>
    /* Resetowanie domyślnych styli */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background-color: #000;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    /* Kontener główny */
    .container {
      width: 400px;
      background-color: #1e1e1e;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 5px 10px rgba(0, 0, 0, 0.6);
    }

    /* Sekcja banera jako zdjęcie */
    .banner {
      position: relative;
      height: 120px;
      background: url('https://cdn.discordapp.com/avatars/1242367942738313276/a_9430a08ea800af8fc52d8126655d7414.gif?size=1024') center/cover no-repeat;
    }

    /* Profil z awatarem */
    .profile {
      position: relative;
      text-align: center;
      margin-top: -50px; /* Przesunięcie nad baner */
    }

    .profile img {
      width: 100px;
      height: 100px;
      border: 4px solid #1e1e1e;
      border-radius: 50%;
      background-color: #000;
    }

    .profile h2 {
      margin-top: 10px;
      font-size: 1.3rem;
      font-weight: bold;
    }

    .profile p {
      font-size: 0.9rem;
      color: #aaa;
      padding: 10px;
    }

    /* Przycisk Subskrypcji */
    .subscribe-btn {
      display: block;
      margin: 10px auto 20px;
      padding: 10px 0;
      width: 90%;
      background-color: #00aaff;
      color: #fff;
      border: none;
      border-radius: 5px;
      font-size: 1rem;
      font-weight: bold;
      text-transform: uppercase;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    .subscribe-btn:hover {
      background-color: #0077cc;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Banner jako obraz -->
    <div class="banner"></div>
    <!-- Profil -->
    <div class="profile">
      <img src="https://cdn.discordapp.com/avatars/1242367942738313276/a_9430a08ea800af8fc52d8126655d7414.gif?size=1024" alt="Avatar" />
      <h2>low_kb</h2>
      <p>
      jakis tam opis
      </p>
    </div>
    <!-- Przycisk Subskrypcji -->
    <a 
      href="https://youtube.com/low-kb" 
      class="subscribe-btn" 
      style="text-decoration: none;">
  <button>Subskrybuj</button>
</a>
  </div>
</body>
</html>
