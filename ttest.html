<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>True Crime Community</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Ikony Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Styl opcjonalny -->
    <link rel="stylesheet" href="css/custom.css">
</head>
<body>
    <!-- Nagłówek -->
    <header class="bg-dark text-white py-3">
        <div class="container d-flex justify-content-between align-items-center">
            <div class="d-flex align-items-center">
                <img src="img/serial_killer_logo.png" alt="Logo" class="rounded-circle me-3" style="width: 70px; height: 70px;">
                <h1 class="h4 mb-0">Мир Маньяков и Серийных Убийц</h1>
            </div>
            <a href="https://youtube.com/c/GONZOKVLT" class="btn btn-danger btn-sm">
                <i class="bi bi-youtube"></i> YouTube
            </a>
        </div>
    </header>

    <!-- Opis Sekcji -->
    <section class="py-4">
        <div class="container">
            <p class="text-secondary">
                Мы — часть <em>“true crime community”</em> в России, литературного жанра, занимающегося публикацией документов, свежих новостей и историй маньяков.
            </p>
        </div>
    </section>

    <!-- Statystyki i Subskrybuj -->
    <section class="bg-light py-4">
        <div class="container d-flex flex-column flex-md-row justify-content-between align-items-center">
            <!-- Statystyki -->
            <div class="mb-3 mb-md-0">
                <i class="bi bi-people-fill"></i>
                <span class="fw-bold">326,2K subskrybentów</span>
            </div>
            <!-- Przycisk Subskrybuj -->
            <a href="https://youtube.com/c/GONZOKVLT" class="btn btn-dark btn-lg">
                Subskrybuj
            </a>
        </div>
    </section>

    <!-- Stopka -->
    <footer class="bg-dark text-white text-center py-3">
        <div class="container">
            <small>&copy; 2024 True Crime Community | Wszystkie prawa zastrzeżone</small>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
