<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Strona z trzema sekcjami i przyciskiem</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Zapewniamy, że element content zostanie przetransformowany płynnie */
    #content {
      transition: transform 0.7s ease-in-out;
    }
  </style>
</head>
<body class="overflow-hidden">
  <div id="scroll-container" class="h-screen relative">
    <div id="content" class="h-[300vh]">
      <section class="relative h-screen bg-blue-600 flex items-center justify-center text-white text-3xl">
        Main
        <button onclick="goNext()" class="absolute bottom-10 left-1/2 transform -translate-x-1/2 bg-white text-blue-600 py-2 px-4 rounded">
          Następna
        </button>
      </section>
      <section class="relative h-screen bg-green-600 flex items-center justify-center text-white text-3xl">
        Info
        <button onclick="goNext()" class="absolute bottom-10 left-1/2 transform -translate-x-1/2 bg-white text-green-600 py-2 px-4 rounded">
          Następna
        </button>
      </section>
      <section class="relative h-screen bg-red-600 flex items-center justify-center text-white text-3xl">
        Stats
        <!-- W ostatniej sekcji przycisk nie jest potrzebny -->
      </section>
    </div>
  </div>
  <script>
    (function() {
      let currentSection = 0;
      const maxSection = 2; // Indeksy: 0, 1, 2
      const content = document.getElementById('content');

      window.goNext = function() {
        if (currentSection < maxSection) {
          currentSection++;
          content.style.transform = `translateY(-${currentSection * 100}vh)`;
        }
      };
    })();
  </script>
</body>
</html>
